[build]
builder = "dockerfile"
buildCommand = "docker build -t flarespark:latest ."

[env]
APP_NAME = "cryptorank"
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "stack"
LOG_LEVEL = "info"
CACHE_DRIVER = "file"
QUEUE_CONNECTION = "sync"
SESSION_DRIVER = "file"
SESSION_LIFETIME = "120"
VITE_APP_NAME = "cryptorank"
RUN_MIGRATIONS = "true"
DB_SEED = "false"

[deploy]
startCommand = "supervisord -c /etc/supervisord.conf"
healthcheckPath = "/health"
healthcheckInterval = "10s"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
